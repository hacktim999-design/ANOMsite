<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ANOM-CHAT | Encrypted</title>
    <style>
        :root { --bg: #0d0d0d; --red: #ff0000; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: monospace; padding: 20px; }
        .chat-container { border: 1px solid var(--red); height: 400px; display: flex; flex-direction: column; background: #050505; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; }
        .input-area { display: flex; padding: 10px; background: #000; }
        input { background: #000; border: 1px solid var(--red); color: #fff; flex: 1; padding: 10px; outline: none; }
        button { background: var(--red); border: none; color: #000; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .system-msg { color: #555; font-size: 0.9em; margin-bottom: 10px; }
        .user-msg { margin-bottom: 10px; border-left: 2px solid var(--red); padding-left: 10px; }
    </style>
</head>
<body>
    <h1><a href="index.html" style="color:var(--red); text-decoration:none;"><- ANOM-CHAT</a></h1>
    <div class="chat-container">
        <div class="messages" id="chatBox">
            <div class="system-msg">[SYSTEM] Secure tunnel initialized at 2026-05-03...</div>
            <div class="system-msg">[SYSTEM] Encryption: AES-256-GCM enabled.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mesajınızı şifreleyin...">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        function send() {
            let input = document.getElementById('msgInput');
            let box = document.getElementById('chatBox');
            if(input.value.trim() != "") {
                box.innerHTML += `<div class="user-msg"><span style="color:red">[OPERATOR]:</span> ${input.value}</div>`;
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
