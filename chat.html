<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANOM-CHAT | SECURE_CHANNEL</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            overflow: hidden; /* Scrollbar'ı gizle */
        }

        /* Dekoratif Arka Plan (Scanline Efekti) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container { 
            position: relative;
            z-index: 3;
            max-width: 800px; 
            margin: 20px auto; 
            padding: 10px;
        }

        .header {
            border-bottom: 2px solid #ff0000;
            padding-bottom: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        /* Yan Dekor Panelleri */
        .status-panel {
            position: fixed;
            top: 100px;
            right: 20px;
            font-size: 10px;
            color: #440000;
            text-align: right;
            line-height: 1.5;
        }

        #chat-box { 
            height: 60vh; 
            border: 1px solid #440000; 
            background: rgba(0,0,0,0.8);
            padding: 15px; 
            overflow-y: auto; 
            box-shadow: inset 0 0 20px #ff000022;
            margin-bottom: 10px;
        }

        .system-msg { color: #555; font-size: 0.8em; margin-bottom: 5px; }
        .user-msg { margin-bottom: 10px; }
        .user-msg span { color: #ff0000; font-weight: bold; }

        .input-area { display: flex; gap: 5px; }
        
        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid #ff0000; 
            color: #0f0; 
            padding: 10px; 
            font-family: monospace;
            outline: none;
        }

        button { 
            background: #ff0000; 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer; 
            font-weight: bold;
            font-family: monospace;
        }

        button:hover { background: #aa0000; }

        /* Dekoratif Köşe Çizgileri */
        .corner {
            position: absolute; width: 20px; height: 20px; border: 2px solid #ff0000;
        }
        .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    </style>
</head>
<body>

<div class="status-panel">
    LOCAL_IP: 192.168.1.104<br>
    UPLINK: ENCRYPTED<br>
    PEERS: 0<br>
    OS: ANOM_CORE_V3
</div>

<div class="container">
    <div class="header">
        <span><-- ANOM-CHAT v2.1</span>
        <span style="font-size: 0.8em;">STATUS: SECURE</span>
    </div>

    <div id="chat-box">
        <div class="system-msg">[SYSTEM] Secure tunnel initialized at 2026-05-08...</div>
        <div class="system-msg">[SYSTEM] Encryption: AES-256-GCM enabled.</div>
        <div class="system-msg">[SYSTEM] Welcome, GHOST.</div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Mesajınızı şifreleyin...">
        <button onclick="sendMsg()">GÖNDER</button>
    </div>
</div>

<script>
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const box = document.getElementById('chat-box');
        if(input.value.trim() === "") return;

        const msgDiv = document.createElement('div');
        msgDiv.className = 'user-msg';
        msgDiv.innerHTML = `<span>> GHOST:</span> ${input.value}`;
        box.appendChild(msgDiv);
        
        input.value = "";
        box.scrollTop = box.scrollHeight;
    }

    // Enter tuşu ile gönderme
    document.getElementById('msgInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMsg();
    });
</script>

</body>
</html>
