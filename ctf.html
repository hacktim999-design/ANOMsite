<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ANOMcompany | CTF</title>
    <style>
        :root { --bg: #0d0d0d; --red: #ff0000; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: monospace; padding: 20px; }
        .challenge-box { border: 2px solid var(--red); padding: 20px; background: #050505; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .hint { color: #888; font-style: italic; margin: 10px 0; }
        input { background: #000; border: 1px solid var(--red); color: #fff; padding: 10px; width: 60%; margin-top: 10px; }
        button { background: var(--red); border: none; color: #000; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1><a href="index.html" style="color:var(--red); text-decoration:none;"><- MISSION CENTER</a></h1>
    
    <div class="challenge-box">
        <h2>MISSION #01: "The Ghost Password"</h2>
        <p>Sistemlerimize sızan anonim bir kullanıcı arkasında şifreli bir mesaj bıraktı. Mesajı çöz ve sisteme giriş yap.</p>
        <div class="hint">İpucu: Bu sitenin adındaki gizli şirket ismini küçük harflerle yaz.</div>
        
        <input type="text" id="flagInput" placeholder="Flag (Şifre) giriniz...">
        <button onclick="checkFlag()">GİRİŞ YAP</button>
        
        <div id="result"></div>
    </div>

    <script>
        function checkFlag() {
            var val = document.getElementById('flagInput').value.toLowerCase();
            var res = document.getElementById('result');
            
            // Şifre: anomcompany
            if(val === "anomcompany") {
                res.innerHTML = "<span style='color:lime;'>[BAŞARILI] Flag: ANOM{W3lc0m3_T0_Th3_SYST3M}</span>";
            } else {
                res.innerHTML = "<span style='color:red;'>[HATA] Erişim Reddedildi! Tekrar dene.</span>";
            }
        }
    </script>
</body>
</html>
