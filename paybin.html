<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ANOMcompany | PAYBIN</title>
    <style>
        :root { --bg: #0d0d0d; --red: #ff0000; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: monospace; padding: 20px; }
        .editor-container { border: 1px solid var(--red); background: #050505; padding: 15px; }
        textarea { 
            width: 100%; 
            height: 300px; 
            background: #000; 
            color: #0f0; 
            border: 1px solid #333; 
            padding: 10px; 
            font-family: monospace; 
            resize: none; 
            outline: none;
        }
        .controls { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status { color: var(--red); font-size: 0.9em; }
        .burn-btn { 
            background: var(--red); 
            color: #000; 
            border: none; 
            padding: 10px 25px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .burn-btn:hover { box-shadow: 0 0 15px var(--red); }
    </style>
</head>
<body>
    <h1><a href="index.html" style="color:var(--red); text-decoration:none;"><- PAYBIN v1.0</a></h1>
    <p>Geçici kod parçacıkları ve şifreli notlar için güvenli alan.</p>

    <div class="editor-container">
        <textarea id="pasteArea" placeholder="// Kodunuzu veya notunuzu buraya yapıştırın..."></textarea>
        <div class="controls">
            <div class="status" id="statusText">DURUM: BEKLEMEDE</div>
            <button class="burn-btn" onclick="lockPaste()">NOTU KİLİTLE</button>
        </div>
    </div>

    <script>
        function lockPaste() {
            const area = document.getElementById('pasteArea');
            const status = document.getElementById('statusText');
            
            if(area.value !== "") {
                status.innerText = "DURUM: ŞİFRELENİYOR...";
                setTimeout(() => {
                    status.innerText = "DURUM: SİSTEME KAYDEDİLDİ (READ-ONLY)";
                    area.style.color = "#444";
                    area.readOnly = true;
                    alert("Not başarıyla kilitlendi!");
                }, 1500);
            }
        }
    </script>
</body>
</html>
