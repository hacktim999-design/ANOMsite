<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANOMcompany | Projects</title>
    <style>
        body { background-color: #080808; color: #e0e0e0; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-btn { color: #ff0000; text-decoration: none; border: 1px solid #600; padding: 5px 10px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background: #ff0000; color: #000; }
        .tool-card { border: 1px solid #600; background: #000; padding: 20px; margin-top: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.1); }
        h1 { color: #ff0000; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        textarea, input[type="text"] { width: 100%; box-sizing: border-box; background: #050505; color: #0f0; border: 1px solid #444; padding: 10px; margin: 15px 0; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; background: #400; color: #fff; border: 1px solid #f00; padding: 12px; cursor: pointer; font-family: monospace; font-weight: bold; transition: 0.2s; }
        button:hover { background: #f00; color: #000; }
        .result-box { margin-top: 20px; padding: 15px; background: #050505; border-left: 4px solid #f00; min-height: 40px; word-break: break-all; color: #0f0; font-size: 0.9em; }
        .found-item { color: #ff0000; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">< BACK_TO_DASHBOARD</a>
        <h1>[ LABORATORY_PROJECTS ]</h1>

        <div class="tool-card">
            <h3 style="color: #ff0000; margin: 0;">ANOM_CIPHER_V1.0</h3>
            <p style="font-size: 0.8em; color: #666;">> Base64 Encryption/Decryption Suite</p>
            <textarea id="anomIn" placeholder="Veriyi buraya girin..."></textarea>
            <div class="btn-group">
                <button onclick="anomProc('enc')">ENCODE</button>
                <button onclick="anomProc('dec')">DECODE</button>
            </div>
            <div id="result" class="result-box">[ WAITING_FOR_DATA ]</div>
        </div>

        <div class="tool-card">
            <h3 style="color: #ff0000; margin: 0;">ANOM_ADMIN_FINDER_V1.0</h3>
            <p style="font-size: 0.8em; color: #666;">> Admin Panel Brute-Force Discovery Tool</p>
            <input type="text" id="targetUrl" placeholder="https://example.com">
            <div class="btn-group">
                <button onclick="startAdminScan()">START_SCAN</button>
            </div>
            <div id="scanStatus" style="margin-top: 10px; font-size: 0.8em; color: #888;">[ IDLE ]</div>
            <div id="adminResults" class="result-box">[ RESULTS_WILL_APPEAR_HERE ]</div>
        </div>
    </div>

    <script>
        // Cipher İşlemleri
        function anomProc(mode) {
            const input = document.getElementById('anomIn').value;
            const res = document.getElementById('result');
            if(!input) return;
            try {
                res.innerText = (mode === 'enc') ? btoa(input) : atob(input);
            } catch(e) { res.innerText = "[!] ERROR: INVALID_FORMAT"; }
        }

        // Admin Finder İşlemleri
        const adminPaths = ['admin/', 'administrator/', 'login.php', 'wp-login.php', 'panel/', 'cpanel/', 'manage/', 'cp/'];

        async function startAdminScan() {
            const url = document.getElementById('targetUrl').value;
            const status = document.getElementById('scanStatus');
            const resBox = document.getElementById('adminResults');
            
            if (!url) { alert("Target URL required!"); return; }
            
            resBox.innerHTML = "";
            status.innerText = "> INITIALIZING_SCAN...";

            for (let path of adminPaths) {
                let fullPath = url.endsWith('/') ? url + path : url + '/' + path;
                status.innerText = `> TESTING_PATH: /${path}`;
                
                await new Promise(r => setTimeout(r, 600)); // Simülasyon hızı
                
                if (Math.random() > 0.7) { // Simüle edilmiş bulgular
                    let div = document.createElement('div');
                    div.className = "found-item";
                    div.innerText = `[+] POSSIBLE_MATCH: ${fullPath}`;
                    resBox.appendChild(div);
                }
            }
            status.innerText = "> SCAN_COMPLETED.";
            if(resBox.innerHTML === "") resBox.innerText = "[!] NO_PANELS_FOUND_IN_COMMON_PATHS";
        }
    </script>
</body>
</html>
